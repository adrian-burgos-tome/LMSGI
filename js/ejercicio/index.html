<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script>
        function addclass(){
            document.getElementById("micontenedor").classList.toggle("miclase")
        }
    </script>
</head>
<body>
    <div id="micontenedor" class="miclase"></div>
    <button onclick="addclass()">cambiar clase</button>
</body>
</html>
